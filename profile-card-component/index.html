<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body>
  <main>
    <article class="card">
      <div class="card__header"></div> 
      <div class="card__body">
        <div class="profile">
          <img 
             src="./assets/images/image-victor.jpg" 
             alt="user profile picture"
             class="profile__picture"
           />
        </div> 
        <div class="profile__info">
          <h1>
            victor crest
            <span>26</span>
          </h1>
         <p class="profile__location">London</p>
        </div>
      </div>
      <div class="card__footer">
        <div class="stats">
          <p class="stat">
            <span class="stat__number">80K</span>
            <span class="stat__property">followers</span>
          </p>
          <p class="stat">
            <span class="stat__number">803K</span>
            <span class="stat__property">likes</span>
          </p>
          <p class="stat">
            <span class="stat__number">1.4K</span>
            <span class="stat__property">photos</span>
          </p>
        </div>        
      </div>
    </article>
  </main>
</body>
</html>
